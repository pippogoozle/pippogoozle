<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Online Radio mit Länderfilter</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  color: #222;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

select, #search {
  padding: 10px;
  width: 60%;
  margin: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  padding: 10px;
  margin: 5px auto;
  width: 60%;
  background: white;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid #ddd;
}

li:hover {
  background: #eee;
}

audio {
  margin-top: 20px;
  width: 80%;
}

#status {
  margin-top: 10px;
  color: red;
}
</style>
</head>

<body>

<h1>📻 Online Radio</h1>

<p>ℹ️ Hinweis: Einige Sender können je nach Browser oder Stream-Verfügbarkeit nicht funktionieren.</p>

<select id="countrySelect">
  <option value="">🌍 Alle Länder</option>
</select>

<input type="text" id="search" placeholder="Sender suchen...">

<ul id="list"></ul>

<audio controls id="player"></audio>

<div id="status"></div>

<script>
const list = document.getElementById("list");
const player = document.getElementById("player");
const status = document.getElementById("status");
const search = document.getElementById("search");
const countrySelect = document.getElementById("countrySelect");

// Länder laden
function loadCountries() {
  fetch("https://de1.api.radio-browser.info/json/countries")
    .then(res => res.json())
    .then(data => {
      data.sort((a, b) => a.name.localeCompare(b.name));

      data.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.name;
        opt.textContent = c.name;
        countrySelect.appendChild(opt);
      });
    });
}

// Sender laden
function loadStations(query = "", country = "") {
  let url = "https://de1.api.radio-browser.info/json/stations/search?limit=30&hidebroken=false";

  if (query) {
    url += "&name=" + encodeURIComponent(query);
  }

  if (country) {
    url += "&country=" + encodeURIComponent(country);
  }

  fetch(url)
    .then(res => res.json())
    .then(data => {
      list.innerHTML = "";

      data.forEach(station => {
        if (!station.url_resolved) return;

        const li = document.createElement("li");

        li.textContent = station.name + " (" + (station.country || "unbekannt") + ")";

        li.onclick = () => {
          status.textContent = "Lade Stream...";
          player.src = station.url_resolved;
          player.play()
            .then(() => {
              status.textContent = "Spielt: " + station.name;
            })
            .catch(() => {
              status.textContent = "❌ Kann nicht abgespielt werden";
            });
        };

        list.appendChild(li);
      });
    });
}

// Events
search.addEventListener("input", () => {
  loadStations(search.value, countrySelect.value);
});

countrySelect.addEventListener("change", () => {
  loadStations(search.value, countrySelect.value);
});

// Start
loadCountries();
loadStations();
</script>

</body>
</html>
